name: Batch Build and Publish CANN Image

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated CANN tags (leave empty to use all from build_cann_arg.json)'
        required: false
        type: string
      publish_base:
        description: 'Publish base image'
        default: false
        type: boolean
        required: true
      publish_devel:
        description: 'Publish devel image'
        default: false
        type: boolean
        required: true
      concurrency:
  group: batch-cann
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix
        id: set-matrix
        run: |
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS="${{ inputs.tags }}"
          else
            TAGS=$(jq -r '.cann[].tags[]' build_cann_arg.json | paste -sd ',' -)
          fi
          MATRIX=$(echo "$TAGS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s .)
          {
            echo "matrix<<EOF"
            echo "{\"cann_tag\":$MATRIX}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/build_and_push_cann.yml
    with:
      cann_tag: ${{ matrix.cann_tag }}
      publish_base: ${{ inputs.publish_base }}
      publish_devel: ${{ inputs.publish_devel }}
    secrets: inherit