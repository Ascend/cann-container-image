jobs:
  only-build:
    name: build ${{ inputs.cann_tag }} (${{ matrix.arch }})
    if: ${{ !inputs.publish }} 
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        id: build
        with: 
          platforms: ${{ matrix.arch }}
          file: ${{ github.workspace }}/cann/${{ inputs.cann_tag }}/Dockerfile
          context: ${{ github.workspace }}/cann/${{ inputs.cann_tag }}
          outputs: type=image
          provenance: false

  build-push-digest:
    name: build ${{ inputs.cann_tag }} (${{ matrix.arch }})
    if: ${{ inputs.publish }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
          ecr: false
          logout: false

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set image repository
        id: set-repo
        run: |
          if [[ "${{ inputs.cann_tag }}" == *"-devel" ]]; then
            echo "docker_repo=docker.io/ascendai/cann-devel" >> $GITHUB_OUTPUT
            echo "quay_repo=quay.io/ascend/cann-devel" >> $GITHUB_OUTPUT
          else
            echo "docker_repo=docker.io/ascendai/cann" >> $GITHUB_OUTPUT
            echo "quay_repo=quay.io/ascend/cann" >> $GITHUB_OUTPUT
          fi

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        id: build
        with: 
          platforms: ${{ matrix.arch }}
          tags: |
            ${{ steps.set-repo.outputs.docker_repo }}
            ${{ steps.set-repo.outputs.quay_repo }}
          file: ${{ github.workspace }}/cann/${{ inputs.cann_tag }}/Dockerfile
          context: ${{ github.workspace }}/cann/${{ inputs.cann_tag }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ inputs.cann_tag }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
  
  push-image:
    runs-on: ubuntu-latest
    needs: build-push-digest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repository
        id: set-repo
        run: |
          if [[ "${{ inputs.cann_tag }}" == *"-devel" ]]; then
            echo "docker_repo=docker.io/ascendai/cann-devel" >> $GITHUB_OUTPUT
            echo "quay_repo=quay.io/ascend/cann-devel" >> $GITHUB_OUTPUT
          else
            echo "docker_repo=docker.io/ascendai/cann" >> $GITHUB_OUTPUT
            echo "quay_repo=quay.io/ascend/cann" >> $GITHUB_OUTPUT
          fi

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.cann_tag }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Prepare tags
        id: prepare-tags
        run: |
          BASE_TAGS=$(jq -r --arg cann_tag "${{ inputs.cann_tag }}" \
            '.versions[] | select(.path == "cann/" + $cann_tag) | .tags[]' \
            cann_publish_version.json)
          registries=(
            "${{ steps.set-repo.outputs.docker_repo }}"
            "${{ steps.set-repo.outputs.quay_repo }}"
          )
          first=true
          TAGS_JSON="["
          for registry in "${registries[@]}"; do
            for tag in $(echo "$BASE_TAGS" | tr ',' ' '); do
              if [ "$first" != true ]; then
                TAGS_JSON+=","
              fi
              TAGS_JSON+="\"${registry}:${tag}\""
              first=false
            done
          done
          TAGS_JSON+="]"
          echo "tags=${TAGS_JSON}" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          TAGS: ${{ steps.prepare-tags.outputs.tags }}
          DOCKER_REPO: ${{ steps.set-repo.outputs.docker_repo }}
          QUAY_REPO: ${{ steps.set-repo.outputs.quay_repo }}
        run: |
          readarray -t TAGS_ARRAY <<< "$(echo "$TAGS" | jq -r '.[]')"

          for TAG in "${TAGS_ARRAY[@]}"; do
            if [[ "$TAG" == *"${QUAY_REPO}"* ]]; then
              docker buildx imagetools create -t "$TAG" \
                $(printf "${QUAY_REPO}@sha256:%s " *)
            elif [[ "$TAG" == *"${DOCKER_REPO}"* ]]; then
              docker buildx imagetools create -t "$TAG" \
                $(printf "${DOCKER_REPO}@sha256:%s " *)
            else
              echo "Error: Unknown registry in TAG: $TAG"
              exit 1
            fi
          done

  sync-image:
    runs-on: ubuntu-latest
    needs: push-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image repository
        id: set-repo
        run: |
          if [[ "${{ inputs.cann_tag }}" == *"-devel" ]]; then
            echo "source_repo=quay.io/ascend/cann-devel" >> $GITHUB_OUTPUT
            echo "dest_name=cann-devel" >> $GITHUB_OUTPUT
          else
            echo "source_repo=quay.io/ascend/cann" >> $GITHUB_OUTPUT
            echo "dest_name=cann" >> $GITHUB_OUTPUT
          fi

      - name: Install skopeo
        run: |
          sudo apt update
          sudo apt install -y skopeo

      - name: Login to Huawei Cloud SWR
        run: |
          echo "${{ secrets.HW_TOKEN }}" | skopeo login \
            --username "${{ secrets.HW_USERNAME }}" \
            --password-stdin \
            swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci

      - name: Login to AscendHub
        run: |
          echo "${{ secrets.ASCENDHUB_TOKEN }}" | skopeo login \
            --username "${{ secrets.ASCENDHUB_USERNAME }}" \
            --password-stdin \
            swr.cn-east-3.myhuaweicloud.com/ascendhub-test

      - name: Sync image
        run: |
          skopeo copy --all \
          docker://${{ steps.set-repo.outputs.source_repo }}:${{ inputs.cann_tag }} \
          docker://swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/${{ steps.set-repo.outputs.dest_name }}:${{ inputs.cann_tag }}

          skopeo copy --all \
          docker://${{ steps.set-repo.outputs.source_repo }}:${{ inputs.cann_tag }} \
          docker://swr.cn-east-3.myhuaweicloud.com/ascendhub-test/${{ steps.set-repo.outputs.dest_name }}:${{ inputs.cann_tag }}
