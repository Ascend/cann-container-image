name: Build and Publish CANN Test Image

on:
  workflow_call:
    inputs:
      cann_tag:
        description: 'CANN unique tag'
        required: true
        type: string
      cann_version:
        description: 'CANN version'
        required: true
        type: string
      py_version:
        description: 'Python version'
        required: true
        type: string
      os_version:
        description: 'OS version'
        required: true
        type: string
      soc:
        description: 'SOC version (CANN package naming)'
        required: true
        type: string
      dockerfile:
        description: 'Test Dockerfile filename'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      cann_tag:
        description: 'CANN unique tag'
        required: true
        type: string
        default: '9.1.0.B090-a3-ubuntu22.04-py3.12'
      cann_version:
        description: 'CANN version'
        required: true
        type: string
        default: '9.1.0.B090'
      py_version:
        description: 'Python version'
        required: true
        type: string
        default: '3.12.13'
      os_version:
        description: 'OS version'
        required: true
        type: string
        default: '24.04'
      soc:
        description: 'SOC version (CANN package naming)'
        required: true
        type: string
        default: 'A3'
      dockerfile:
        description: 'Test Dockerfile filename'
        required: true
        type: string
        default: 'Dockerfile.ubuntu.cann.test'

jobs:
  build-push-digest:
    name: build ${{ inputs.cann_tag }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}
          ecr: false
          logout: false

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          platforms: ${{ matrix.platform }}
          tags: quay.io/canuunac/cann
          file: ${{ github.workspace }}/cann_test_version/${{ inputs.dockerfile }}
          context: ${{ github.workspace }}
          build-args: |
            OS_VERSION=${{ inputs.os_version }}
            PY_VERSION=${{ inputs.py_version }}
            CANN_VERSION=${{ inputs.cann_version }}
            SOC_VERSION=${{ inputs.soc }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          provenance: false

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ inputs.cann_tag }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  push-image:
    name: manifest ${{ inputs.cann_tag }}
    runs-on: ubuntu-latest
    needs: build-push-digest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ inputs.cann_tag }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create -t quay.io/canuunac/cann:${{ inputs.cann_tag }} \
            $(printf 'quay.io/canuunac/cann@sha256:%s ' *)
