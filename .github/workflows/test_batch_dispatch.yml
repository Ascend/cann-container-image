name: Test Batch Dispatch

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated tags for testing'
        required: false
        type: string
      jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix
        id: set-matrix
        run: |
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS="${{ inputs.tags }}"
          else
            TAGS=$(jq -r '.cann[].tags[]' build_cann_arg.json | paste -sd ',' -)
          fi
          MATRIX=$(echo "$TAGS" | tr ',' '\n' | sed '/^$/d' | jq -R . | jq -s .)
          {
            echo "matrix<<EOF"
            echo "{\"cann_tag\":$MATRIX}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    uses: ./.github/workflows/test_target.yml
    with:
      cann_tag: ${{ matrix.cann_tag }}
      publish_base: false
      publish_devel: false